services:
  - type: web
    name: cognifyr-workflow-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard manually
      - key: REDIS_URL
        sync: false # Set this in the Render dashboard manually
      - key: JWT_SECRET
        sync: false # Set this in the Render dashboard manually
      - key: WEBHOOK_SECRET
        sync: false # Set this in the Render dashboard manually
      - key: FRONTEND_URL
        sync: false # Set this to the Vercel frontend URL once deployed
